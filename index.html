/* ÜRÜN LİSTESİ */

const urunler = [];

    urunler.push({
        ad: "Audemars Piguet Model " + (sira + 1),
        resim: resim,
        kategori: "erkek saat audemars"
    });
});


ciftSaatResimleri.forEach(function(resim, sira) {
    urunler.push({
        ad: "Çift Saat Model " + (sira + 1),
        resim: resim,
        kategori: "cift saat"
    });
});


bvlgariKadinResimleri.forEach(function(resim, sira) {
    urunler.push({
        ad: "Bvlgari Kadın Model " + (sira + 1),
        resim: resim,
        kategori: "kadin saat bvlgari"
    });
});


bvlgariErkekResimleri.forEach(function(resim, sira) {
    urunler.push({
        ad: "Bvlgari Erkek Model " + (sira + 1),
        resim: resim,
        kategori: "erkek saat bvlgari"
    });
});


/* ÜRÜNLERİ SAYFAYA EKLE */

const urunlerAlani =
    document.getElementById("urunler");


urunler.forEach(function(urun) {

    const kart = document.createElement("div");

    kart.className = "card";

    kart.setAttribute(
        "data-category",
        urun.kategori
    );

    kart.innerHTML = `

        <img
            src="${urun.resim}"
            alt="${urun.ad}"
            
        >

        <h3>${urun.ad}</h3>

        <p class="price">
            Fiyat için iletişime geçin
        </p>

        <button
            onclick="sepeteEkle('${urun.ad}', 0)"
        >
            Sepete Ekle
        </button>

        <button
            class="fav"
            onclick="favoriyeEkle('${urun.ad}')"
        >
            ❤️ Favorilere Ekle
        </button>

    `;

    urunlerAlani.appendChild(kart);
});


/* FOTOĞRAF ANA KLASÖRDE YOKSA IMAGES KLASÖRÜNDE ARA */

function resimYoluDuzelt(resim, dosyaAdi) {

    if (resim.dataset.denenen === "images") {
        return;
    }

    resim.dataset.denenen = "images";

    resim.src = "images/" + dosyaAdi;
}


/* FİLTRELEME */

function filtrele(kategori) {

    const kartlar =
        document.querySelectorAll(".card");

    kartlar.forEach(function(kart) {

        const kategoriBilgisi =
            kart.getAttribute("data-category") || "";

        if (
            kategori === "hepsi" ||
            kategoriBilgisi.includes(kategori)
        ) {
            kart.style.display = "";
        } else {
            kart.style.display = "none";
        }

    });

}


/* ARAMA */

const aramaKutusu =
    document.getElementById("arama");


aramaKutusu.addEventListener(
    "input",
    function() {

        const aranan =
            aramaKutusu.value
                .toLocaleLowerCase("tr-TR")
                .trim();

        const kartlar =
            document.querySelectorAll(".card");

        kartlar.forEach(function(kart) {

            const urunAdi =
                kart.textContent
                    .toLocaleLowerCase("tr-TR");

            if (urunAdi.includes(aranan)) {
                kart.style.display = "";
            } else {
                kart.style.display = "none";
            }

        });

    }
);


/* SEPET */

function sepetiGetir() {
    return JSON.parse(
        localStorage.getItem("sepet")
    ) || [];
}


function sepeteEkle(ad, fiyat) {

    const sepet = sepetiGetir();

    sepet.push({
        ad: ad,
        fiyat: Number(fiyat) || 0
    });

    localStorage.setItem(
        "sepet",
        JSON.stringify(sepet)
    );

    sepetSayisiniGuncelle();

    alert(ad + " sepete eklendi.");
}


function sepetSayisiniGuncelle() {

    const sayac =
        document.getElementById("cartCount");

    if (!sayac) {
        return;
    }

    const sepet = sepetiGetir();

    sayac.textContent = sepet.length;
}


/* FAVORİLER */

function favoriyeEkle(ad) {

    const favoriler =
        JSON.parse(
            localStorage.getItem("favoriler")
        ) || [];

    if (!favoriler.includes(ad)) {

        favoriler.push(ad);

        localStorage.setItem(
            "favoriler",
            JSON.stringify(favoriler)
        );

        alert(ad + " favorilere eklendi.");

    } else {

        alert("Bu ürün zaten favorilerde.");

    }

}


/* SAYFA AÇILINCA */

sepetSayisiniGuncelle();
