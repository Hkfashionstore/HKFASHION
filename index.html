<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>HKFASHION</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #080808;
            color: white;
            font-family: Arial, sans-serif;
        }

        header {
            padding: 18px;
            text-align: center;
            background: #111;
            border-bottom: 1px solid #333;
        }

        h1 {
            margin: 0 0 15px;
            color: #d4af37;
        }

        #arama {
            width: 100%;
            max-width: 500px;
            padding: 13px;
            border: 1px solid #555;
            border-radius: 10px;
            background: #1b1b1b;
            color: white;
            font-size: 16px;
        }

        nav {
            margin-top: 15px;
        }

        nav a {
            display: inline-block;
            margin: 5px;
            color: white;
            text-decoration: none;
        }

        .hero {
            text-align: center;
            padding: 38px 15px;
            background: linear-gradient(#151515, #080808);
        }

        .hero h2 {
            color: #d4af37;
            font-size: 30px;
            margin-bottom: 10px;
        }

        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 10;
            background: #080808;
        }

        .categories button {
            flex: 0 0 auto;
            padding: 11px 16px;
            border: 1px solid #d4af37;
            border-radius: 20px;
            background: #171717;
            color: white;
            cursor: pointer;
        }

        .categories button:active {
            background: #d4af37;
            color: black;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            padding: 12px;
        }

        .card {
            background: #151515;
            border: 1px solid #333;
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            border-radius: 10px;
            background: #222;
        }

        .card h3 {
            min-height: 42px;
            font-size: 15px;
            margin: 10px 0;
        }

        .price {
            color: #d4af37;
            font-size: 13px;
        }

        .card button {
            width: 100%;
            margin-top: 7px;
            padding: 10px 5px;
            border: 0;
            border-radius: 8px;
            background: #d4af37;
            color: black;
            font-weight: bold;
        }

        .card .fav {
            background: #333;
            color: white;
        }

        .contact {
            text-align: center;
            padding: 30px 15px;
            background: #111;
        }

        .contact a {
            color: #d4af37;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: #aaa;
        }

        .cart {
            position: fixed;
            right: 14px;
            bottom: 75px;
            z-index: 20;
            padding: 12px;
            border-radius: 50%;
            background: #d4af37;
            color: black;
            text-decoration: none;
            font-weight: bold;
        }

        .whatsapp {
            position: fixed;
            right: 14px;
            bottom: 15px;
            z-index: 20;
            padding: 14px;
            border-radius: 50%;
            background: #25d366;
            color: white;
            text-decoration: none;
            font-size: 20px;
        }

        .bos-mesaj {
            grid-column: 1 / -1;
            padding: 40px 15px;
            text-align: center;
            color: #aaa;
        }

        @media (min-width: 700px) {
            .products {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>

<a class="cart" href="cart.html">
    🛒 <span id="cartCount">0</span>
</a>

<header>
    <h1>HKFASHION</h1>

    <input
        type="text"
        id="arama"
        placeholder="Ürün ara..."
    >

    <nav>
        <a href="#anasayfa">Ana Sayfa</a>
        <a href="#urunler">Ürünler</a>
        <a href="favorites.html">❤️ Favoriler</a>
        <a href="#iletisim">İletişim</a>
    </nav>
</header>

<section class="hero" id="anasayfa">
    <h2>Tarzını Tamamla</h2>
    <p>Premium Saat • Kadın • Erkek • Çift Saat</p>
</section>

<section class="categories">
    <button onclick="filtrele('hepsi')">Tümü</button>
    <button onclick="filtrele('erkek')">Erkek</button>
    <button onclick="filtrele('kadin')">Kadın</button>
    <button onclick="filtrele('cift')">Çift Saat</button>
    <button onclick="filtrele('audemars')">Audemars Piguet</button>
    <button onclick="filtrele('bvlgari')">Bvlgari</button>
</section>

<section class="products" id="urunler"></section>

<section class="contact" id="iletisim">
    <h2>İletişim</h2>

    <p>
        WhatsApp:
        <a href="https://wa.me/905412098671">
            0541 209 86 71
        </a>
    </p>

    <p>
        Instagram:
        <a
            href="https://instagram.com/halilkaynakk"
            target="_blank"
        >
            @halilkaynakk
        </a>
    </p>
</section>

<footer>
    © 2026 HKFASHION
</footer>

<a
    class="whatsapp"
    href="https://wa.me/905412098671"
>
    💬
</a>

    const ciftSaatResimleri = [

    const bvlgariKadinResimleri = [

    ];

    const urunler = [];

    audemarsResimleri.forEach(function (resim, sira) {
        urunler.push({
            ad: "Audemars Piguet Model " + (sira + 1),
            resim: resim,
            kategori: "erkek saat audemars"
        });
    });

    ciftSaatResimleri.forEach(function (resim, sira) {
        urunler.push({
            ad: "Çift Saat Model " + (sira + 1),
            resim: resim,
            kategori: "cift saat"
        });
    });

    bvlgariKadinResimleri.forEach(function (resim, sira) {
        urunler.push({
            ad: "Bvlgari Kadın Model " + (sira + 1),
            resim: resim,
            kategori: "kadin saat bvlgari"
        });
    });

    bvlgariErkekResimleri.forEach(function (resim, sira) {
        urunler.push({
            ad: "Bvlgari Erkek Model " + (sira + 1),
            resim: resim,
            kategori: "erkek saat bvlgari"
        });
    });

    const urunlerAlani = document.getElementById("urunler");

    function kartOlustur(urun) {
        const kart = document.createElement("div");
        kart.className = "card";
        kart.dataset.category = urun.kategori;

        const resim = document.createElement("img");
        resim.src = "./" + urun.resim;
        resim.alt = urun.ad;

        resim.onerror = function () {
            if (resim.dataset.yedekDenendi === "evet") {
                resim.onerror = null;
                return;
            }

            resim.dataset.yedekDenendi = "evet";
            resim.src = "images/" + urun.resim;
        };

        const baslik = document.createElement("h3");
        baslik.textContent = urun.ad;

        const fiyat = document.createElement("p");
        fiyat.className = "price";
        fiyat.textContent = "Fiyat için iletişime geçin";

        const sepetButonu = document.createElement("button");
        sepetButonu.textContent = "Sepete Ekle";
        sepetButonu.onclick = function () {
            sepeteEkle(urun.ad);
        };

        const favoriButonu = document.createElement("button");
        favoriButonu.className = "fav";
        favoriButonu.textContent = "❤️ Favorilere Ekle";
        favoriButonu.onclick = function () {
            favoriyeEkle(urun.ad);
        };

        kart.appendChild(resim);
        kart.appendChild(baslik);
        kart.appendChild(fiyat);
        kart.appendChild(sepetButonu);
        kart.appendChild(favoriButonu);

        return kart;
    }

    urunler.forEach(function (urun) {
        urunlerAlani.appendChild(kartOlustur(urun));
    });

    function filtrele(kategori) {
        const kartlar = document.querySelectorAll(".card");

        kartlar.forEach(function (kart) {
            const bilgiler = kart.dataset.category || "";

            if (
                kategori === "hepsi" ||
                bilgiler.includes(kategori)
            ) {
                kart.style.display = "block";
            } else {
                kart.style.display = "none";
            }
        });
    }

    document
        .getElementById("arama")
        .addEventListener("input", function () {
            const aranan = this.value
                .toLocaleLowerCase("tr-TR")
                .trim();

            document
                .querySelectorAll(".card")
                .forEach(function (kart) {
                    const metin = kart.textContent
                        .toLocaleLowerCase("tr-TR");

                    kart.style.display =
                        metin.includes(aranan)
                            ? "block"
                            : "none";
                });
        });

    function sepetiGetir() {
        try {
            return JSON.parse(
                localStorage.getItem("sepet")
            ) || [];
        } catch {
            return [];
        }
    }

    function sepeteEkle(ad) {
        const sepet = sepetiGetir();

        sepet.push({
            ad: ad,
            fiyat: 0
        });

        localStorage.setItem(
            "sepet",
            JSON.stringify(sepet)
        );

        sepetSayisiniGuncelle();
        alert(ad + " sepete eklendi.");
    }

    function sepetSayisiniGuncelle() {
        document.getElementById("cartCount").textContent =
            sepetiGetir().length;
    }

    function favoriyeEkle(ad) {
        let favoriler = [];

        try {
            favoriler = JSON.parse(
                localStorage.getItem("favoriler")
            ) || [];
        } catch {
            favoriler = [];
        }

        if (!favoriler.includes(ad)) {
            favoriler.push(ad);

            localStorage.setItem(
                "favoriler",
                JSON.stringify(favoriler)
            );

            alert(ad + " favorilere eklendi.");
        } else {
            alert("Bu ürün zaten favorilerde.");
        }
    }

    sepetSayisiniGuncelle();
</script>

</html>
